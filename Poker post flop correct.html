<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postflop Range Simulator - Prototype</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #222 url('https://www.transparenttextures.com/patterns/wood-pattern.png'); color: #d2dae2; overflow: hidden; user-select: none; }
        
        /* Top Controls */
        .controls { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 15px 20px; border-radius: 12px; z-index: 100; border: 1px solid #555; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls h2 { margin: 0 0 10px 0; font-size: 1.1em; color: #f1c40f; text-transform: uppercase; }
        select { padding: 10px; font-size: 1em; width: 100%; border-radius: 6px; background: #2c3e50; color: white; border: 1px solid #34495e; outline: none; cursor: pointer; }
        
        /* Full Screen Poker Table */
        .table-area { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 85vw; height: 60vh; max-width: 1400px; max-height: 700px; }
        .poker-table { position: relative; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #27864c 0%, #15502c 100%); border-radius: 250px; border: 25px solid #111; box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 30px 60px rgba(0,0,0,0.9); }
        
        /* Center Info: Board & Pot */
        .board-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; }
        .pot-size { background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 20px; font-size: 1.2em; font-weight: bold; color: #f1c40f; display: inline-block; margin-bottom: 10px; border: 1px solid #444; }
        .community-cards { display: flex; gap: 8px; justify-content: center; }
        .scenario-desc { font-size: 1.1em; color: #ecf0f1; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 8px; }

        /* Seats */
        .seat { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); z-index: 10; transition: 0.3s; }
        .nameplate { background: linear-gradient(to bottom, #4a4a4a, #2b2b2b); border: 2px solid #777; border-radius: 20px; padding: 6px 20px; min-width: 100px; text-align: center; font-weight: bold; font-size: 1em; box-shadow: 0 5px 15px rgba(0,0,0,0.6); position: relative; z-index: 5; color: #ddd; }
        
        /* Actieve statussen */
        .seat.hero .nameplate { background: linear-gradient(to bottom, #2980b9, #1c5980); border-color: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.8); color: white; }
        .seat.villain .nameplate { background: linear-gradient(to bottom, #c0392b, #8a241a); border-color: #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.8); color: white; }

        /* Posities */
        #seat-UTG  { left: 5%; top: 50%; }
        #seat-UTG1 { left: 15%; top: 10%; }
        #seat-UTG2 { left: 35%; top: -5%; }
        #seat-LJ   { left: 65%; top: -5%; }
        #seat-HJ   { left: 85%; top: 10%; }
        #seat-CO   { left: 95%; top: 50%; }
        #seat-BTN  { left: 85%; top: 90%; }
        #seat-SB   { left: 65%; top: 105%; }
        #seat-BB   { left: 35%; top: 105%; }

        /* Cards */
        .card { background: white; width: 50px; height: 75px; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 1.6em; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.6); border: 1px solid #999; }
        .card.red { color: #e74c3c; } .card.black { color: #2c3e50; }
        .card-back { background: repeating-linear-gradient(45deg, #b71540, #b71540 5px, #8c102f 5px, #8c102f 10px); border: 2px solid white; color: transparent; }
        
        .seat-cards { position: absolute; top: -65px; display: flex; gap: 4px; opacity: 0; transition: 0.3s; z-index: 2; transform: scale(0.9); }
        .seat.hero .seat-cards, .seat.villain .seat-cards { opacity: 1; }
        .seat.hero .seat-cards { transform: scale(1.2) translateY(-10px); z-index: 6; }

        /* Action Panel (Onderin) */
        .action-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(15, 15, 15, 0.95); padding: 20px 30px; border-radius: 12px; border: 1px solid #444; text-align: center; z-index: 100; min-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        #prompt { font-size: 1.3em; font-weight: bold; margin-bottom: 15px; }
        
        .buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .action-btn { padding: 12px 20px; font-size: 1em; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; min-width: 100px; transition: 0.2s; text-transform: uppercase; }
        .action-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-check { background-color: #27ae60; } .btn-call { background-color: #2980b9; } .btn-bet-small { background-color: #f39c12; } .btn-bet-med { background-color: #e67e22; } .btn-bet-large { background-color: #d35400; } .btn-jam { background-color: #8e44ad; } .btn-fold { background-color: #7f8c8d; }

        /* Coach Feedback Modal */
        #coach-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e272e; padding: 30px; border-radius: 12px; border: 2px solid #555; box-shadow: 0 20px 50px rgba(0,0,0,0.9); z-index: 200; width: 500px; text-align: left; }
        .coach-header { font-size: 1.5em; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #444; }
        .coach-correct { color: #2ecc71; border-color: #2ecc71; }
        .coach-incorrect { color: #e74c3c; border-color: #e74c3c; }
        .ev-box { background: #2f3640; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-family: monospace; font-size: 1.1em; border-left: 4px solid #f1c40f; }
        .reason-list { margin: 0; padding-left: 20px; color: #bdc3c7; line-height: 1.5; }
        .btn-close { margin-top: 20px; width: 100%; background: #34495e; padding: 10px; font-size: 1.1em; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-close:hover { background: #2c3e50; }
        
        /* Backdrop */
        #backdrop { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 150; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Postflop Scenarios (Mock)</h2>
        <select id="scenario-select" onchange="loadScenario()">
            <option value="spot_1">Spot 1: Flop C-Bet (BTN vs BB)</option>
            <option value="spot_2">Spot 2: Turn Defense (BB vs SB)</option>
            <option value="spot_3">Spot 3: River Value/Bluff (CO vs BB)</option>
        </select>
    </div>

    <div class="table-area">
        <div class="poker-table">
            
            <div class="board-area">
                <div class="pot-size" id="pot-display">Pot: 5.5 BB</div>
                <div class="community-cards" id="board-cards">
                    </div>
                <div class="scenario-desc" id="action-history">BB Checks. Action on you.</div>
            </div>

            <div id="seat-UTG" class="seat"><div class="seat-cards"></div><div class="nameplate">UTG</div></div>
            <div id="seat-UTG1" class="seat"><div class="seat-cards"></div><div class="nameplate">UTG+1</div></div>
            <div id="seat-UTG2" class="seat"><div class="seat-cards"></div><div class="nameplate">UTG+2</div></div>
            <div id="seat-LJ" class="seat"><div class="seat-cards"></div><div class="nameplate">LJ</div></div>
            <div id="seat-HJ" class="seat"><div class="seat-cards"></div><div class="nameplate">HJ</div></div>
            <div id="seat-CO" class="seat"><div class="seat-cards"></div><div class="nameplate">CO</div></div>
            <div id="seat-BTN" class="seat"><div class="seat-cards"></div><div class="nameplate">BTN</div></div>
            <div id="seat-SB" class="seat"><div class="seat-cards"></div><div class="nameplate">SB</div></div>
            <div id="seat-BB" class="seat"><div class="seat-cards"></div><div class="nameplate">BB</div></div>
        </div>
    </div>

    <div class="action-panel">
        <div id="prompt">Jouw actie? (Effectieve stack: 94.5 BB)</div>
        <div class="buttons" id="action-buttons">
            <button class="action-btn btn-fold" id="btn-fold" onclick="evaluateAction('Fold')">Fold</button>
            <button class="action-btn btn-check" id="btn-check" onclick="evaluateAction('Check')">Check</button>
            <button class="action-btn btn-call" id="btn-call" onclick="evaluateAction('Call')">Call</button>
            <button class="action-btn btn-bet-small" id="btn-b33" onclick="evaluateAction('Bet 33%')">Bet 33%</button>
            <button class="action-btn btn-bet-med" id="btn-b75" onclick="evaluateAction('Bet 75%')">Bet 75%</button>
            <button class="action-btn btn-jam" id="btn-jam" onclick="evaluateAction('All-In')">All-in</button>
        </div>
    </div>

    <div id="backdrop"></div>
    <div id="coach-modal">
        <div class="coach-header" id="coach-title">Resultaat</div>
        <div class="ev-box" id="coach-ev">
            Gekozen: Bet 75%<br>
            Beste Actie: Bet 33%<br>
            EV Gap: -0.42 BB
        </div>
        <strong>Coach Analyse:</strong>
        <ul class="reason-list" id="coach-reasons">
            <li>Reason 1</li>
            <li>Reason 2</li>
        </ul>
        <button class="btn-close" onclick="closeModal()">Sluiten & Volgende</button>
    </div>

<script>
    // --- POSTFLOP SCENARIO DATABASE (MOCK GEBASEERD OP BLUEPRINT) ---
    const scenarios = {
        "spot_1": {
            heroPos: "BTN",
            villainPos: "BB",
            pot: "5.5 BB",
            stack: "94.5 BB",
            board: [{r:'A',s:'♠'}, {r:'7',s:'♦'}, {r:'2',s:'♣'}],
            heroCards: [{r:'Q',s:'♥'}, {r:'Q',s:'♠'}],
            history: "Preflop: Je opent 2.5bb, BB callt.<br>Flop (A♠ 7♦ 2♣): BB checks. Action on you.",
            validActions: ['Check', 'Bet 33%', 'Bet 75%'],
            bestAction: "Bet 33%",
            evaluations: {
                "Bet 33%": { ev: "+0.15 BB", gap: "0.00 BB", isBest: true,
                    reasons: [
                        "Je hebt een groot range voordeel op een A-hoog rainbow board als preflop aggressor.",
                        "Een kleine betgrootte zet de zwakke range van Villain (zwakke paren, gutshots) perfect onder druk.",
                        "QQ profiteert van protectie, maar wil niet polariseren met een grote bet tegen A-x."
                    ]},
                "Check": { ev: "-0.05 BB", gap: "-0.20 BB", isBest: false,
                    reasons: [
                        "Te passief. Checken geeft gratis kaarten aan overcards zoals K-J of flush-backdoors.",
                        "Je mist 'thin value' tegen slechtere pocket paren (88-JJ) of 7-x."
                    ]},
                "Bet 75%": { ev: "-0.25 BB", gap: "-0.40 BB", isBest: false,
                    reasons: [
                        "Een grote bet isoleert je tegen handen die jou verslaan (A-x, sets, twee paren).",
                        "QQ is niet sterk genoeg om hier zo zwaar te 'polariseren'."
                    ]}
            }
        },
        "spot_2": {
            heroPos: "BB",
            villainPos: "SB",
            pot: "12 BB",
            stack: "88 BB",
            board: [{r:'K',s:'♥'}, {r:'J',s:'♥'}, {r:'4',s:'♣'}, {r:'5',s:'♦'}],
            heroCards: [{r:'A',s:'♥'}, {r:'Q',s:'♥'}],
            history: "Preflop: SB opent 3bb, jij 3-bet naar 9bb, SB callt.<br>Flop (K♥ J♥ 4♣): SB checks, Jij checks.<br>Turn (5♦): SB bets 6 BB (50% pot).",
            validActions: ['Fold', 'Call', 'All-In'],
            bestAction: "Call",
            evaluations: {
                "Call": { ev: "+2.10 BB", gap: "0.00 BB", isBest: true,
                    reasons: [
                        "Je hebt een massieve combodraw: Nut Flush Draw + Gutshot naar de straat (T).",
                        "Je 'realization value' in positie is enorm; je sluit de actie af.",
                        "Callen houdt zijn bluffs in de hand voor de river."
                    ]},
                "Fold": { ev: "0.00 BB", gap: "-2.10 BB", isBest: false,
                    reasons: [
                        "Je foldt veel te veel equity (kans om te winnen).",
                        "Tegen een aggressieve speler (Aggro Reg) ben je hier makkelijk uit te buiten (overfold mistake)."
                    ]},
                "All-In": { ev: "+1.20 BB", gap: "-0.90 BB", isBest: false,
                    reasons: [
                        "Je hebt weinig fold equity (kans dat hij foldt) als hij zelf lead op deze gecoördineerde turn.",
                        "Als je wordt gecalld, sta je vaak achter tegen sets of two-pair.",
                        "Realiseer je equity door gewoon te callen."
                    ]}
            }
        },
        "spot_3": {
            heroPos: "CO",
            villainPos: "BB",
            pot: "22 BB",
            stack: "78 BB",
            board: [{r:'9',s:'♠'}, {r:'8',s:'♠'}, {r:'2',s:'♣'}, {r:'3',s:'♦'}, {r:'7',s:'♥'}],
            heroCards: [{r:'A',s:'♣'}, {r:'K',s:'♣'}],
            history: "Flop & Turn zijn doorgecheckt.<br>River: BB checks. Action on you.",
            validActions: ['Check', 'Bet 33%', 'Bet 75%', 'All-In'],
            bestAction: "Check",
            evaluations: {
                "Check": { ev: "+0.00 BB", gap: "0.00 BB", isBest: true,
                    reasons: [
                        "Je hebt 'Showdown Value' met A-K hoog.",
                        "Als je bet, word je alleen gecalld door paren (die jou verslaan).",
                        "A-K blokkeert geen logische bluffs, het is een prima hand om mee naar showdown te gaan."
                    ]},
                "Bet 75%": { ev: "-1.50 BB", gap: "-1.50 BB", isBest: false,
                    reasons: [
                        "Dit is een pure 'Overbluff' fout. Wat probeer je te laten folden?",
                        "Villain range bevat veel T-J (straat), 8-x, 9-x die nooit meer weggaan op de river."
                    ]},
                "Bet 33%": { ev: "-0.80 BB", gap: "-0.80 BB", isBest: false,
                    reasons: [
                        "Je probeert 'thin value' te halen met A-hoog, wat mathematisch onmogelijk is op dit board.",
                        "Check de river om je equity te realiseren."
                    ]},
                 "All-In": { ev: "-2.20 BB", gap: "-2.20 BB", isBest: false,
                    reasons: [
                        "Kamikaze bluff. Villain's posterior range in de BB bevat veel gemaakte straten en sets op dit board.",
                        "Je riskeert 78BB om 22BB te winnen met vrijwel nul fold-equity tegen de top van zijn range."
                    ]}
            }
        }
    };

    let currentSpot = null;

    function renderCard(card) {
        let colorClass = (card.s === '♥' || card.s === '♦') ? 'red' : 'black';
        return `<div class="card ${colorClass}">${card.r}${card.s}</div>`;
    }

    function loadScenario() {
        const key = document.getElementById('scenario-select').value;
        currentSpot = scenarios[key];

        // 1. Reset Board & Info
        document.getElementById('pot-display').innerText = `Pot: ${currentSpot.pot}`;
        document.getElementById('action-history').innerHTML = currentSpot.history;
        document.getElementById('prompt').innerText = `Jouw actie? (Stack: ${currentSpot.stack})`;

        // Render Community Cards
        const boardDiv = document.getElementById('board-cards');
        boardDiv.innerHTML = '';
        currentSpot.board.forEach(c => boardDiv.innerHTML += renderCard(c));

        // 2. Reset Tafel Visuals
        document.querySelectorAll('.seat').forEach(seat => {
            seat.classList.remove('hero', 'villain');
            seat.querySelector('.seat-cards').innerHTML = '';
        });

        // Hero Positie
        const heroSeat = document.getElementById('seat-' + currentSpot.heroPos);
        heroSeat.classList.add('hero');
        heroSeat.querySelector('.seat-cards').innerHTML = renderCard(currentSpot.heroCards[0]) + renderCard(currentSpot.heroCards[1]);

        // Villain Positie
        const oppSeat = document.getElementById('seat-' + currentSpot.villainPos);
        oppSeat.classList.add('villain');
        oppSeat.querySelector('.seat-cards').innerHTML = `<div class="card card-back"></div><div class="card card-back"></div>`;

        // 3. Toon alleen toegestane acties voor deze spot
        document.querySelectorAll('.action-btn').forEach(btn => btn.style.display = 'none');
        currentSpot.validActions.forEach(action => {
            if (action === 'Check') document.getElementById('btn-check').style.display = 'inline-block';
            if (action === 'Fold') document.getElementById('btn-fold').style.display = 'inline-block';
            if (action === 'Call') document.getElementById('btn-call').style.display = 'inline-block';
            if (action === 'Bet 33%') document.getElementById('btn-b33').style.display = 'inline-block';
            if (action === 'Bet 75%') document.getElementById('btn-b75').style.display = 'inline-block';
            if (action === 'All-In') document.getElementById('btn-jam').style.display = 'inline-block';
        });
    }

    function evaluateAction(playerAction) {
        const evalData = currentSpot.evaluations[playerAction];
        
        const modal = document.getElementById('coach-modal');
        const backdrop = document.getElementById('backdrop');
        const title = document.getElementById('coach-title');
        const evBox = document.getElementById('coach-ev');
        const reasonList = document.getElementById('coach-reasons');

        if (evalData.isBest) {
            title.innerText = "Correcte Beslissing!";
            title.className = "coach-header coach-correct";
        } else {
            title.innerText = "Inaccurate Beslissing";
            title.className = "coach-header coach-incorrect";
        }

        evBox.innerHTML = `
            Actie Gekozen: <strong>${playerAction}</strong><br>
            Beste Solver Actie: <strong>${currentSpot.bestAction}</strong><br>
            EV Verlies: <span style="color:${evalData.isBest ? '#2ecc71' : '#e74c3c'}">${evalData.gap}</span>
        `;

        reasonList.innerHTML = '';
        evalData.reasons.forEach(r => {
            reasonList.innerHTML += `<li>${r}</li>`;
        });

        modal.style.display = 'block';
        backdrop.style.display = 'block';
    }

    function closeModal() {
        document.getElementById('coach-modal').style.display = 'none';
        document.getElementById('backdrop').style.display = 'none';
        
        // Simuleer naar de volgende spot gaan
        const select = document.getElementById('scenario-select');
        select.selectedIndex = (select.selectedIndex + 1) % select.options.length;
        loadScenario();
    }

    // Start
    window.onload = loadScenario;
</script>
</body>
</html>
